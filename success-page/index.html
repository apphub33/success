<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Account created</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root { color-scheme: light dark; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: radial-gradient(1200px 700px at 70% 30%, rgba(58,134,255,.12), transparent 60%),
                  radial-gradient(900px 600px at 30% 70%, rgba(0,220,130,.10), transparent 60%),
                  #0b132b;
      color: #e7ecff;
      display: grid;
      place-items: center;
    }
    .card {
      background: rgba(28, 37, 65, 0.85);
      backdrop-filter: blur(6px);
      border-radius: 18px;
      padding: 28px 26px;
      width: min(92vw, 560px);
      box-shadow: 0 20px 60px rgba(0,0,0,.35);
    }
    .row { display: flex; align-items: start; gap: 14px; }
    .check {
      flex: 0 0 34px; height: 34px; width: 34px; border-radius: 8px;
      display: grid; place-items: center;
      background: #25d36622; border: 1px solid #25d36655;
    }
    .check svg { width: 20px; height: 20px; color: #2ee07a; }
    h1 {
      margin: 0 0 6px; font-size: 22px; font-weight: 800; letter-spacing: .2px;
      color: #f3f6ff;
      text-shadow: 0 1px 0 rgba(0,0,0,.25);
    }
    p { margin: 0; line-height: 1.55; color: #c9d2ff; }
    .actions { margin-top: 16px; }
    a.btn {
      display: inline-block;
      padding: 10px 14px;
      background: #2f80ff;
      color: white; text-decoration: none; font-weight: 700;
      border-radius: 10px;
      box-shadow: inset 0 -2px 0 rgba(0,0,0,.2), 0 6px 16px rgba(47,128,255,.35);
      transition: transform .08s ease, filter .08s ease;
    }
    a.btn:hover { filter: brightness(1.05); }
    a.btn:active { transform: translateY(1px); }
    .hint { margin-top: 8px; font-size: 13px; color: #9fb0ff; opacity: .9; }
  </style>
</head>
<body>
  <main class="card" role="main" aria-labelledby="title">
    <div class="row">
      <div class="check" aria-hidden="true">
        <!-- Check icon -->
        <svg viewBox="0 0 24 24" fill="none">
          <path d="M20 6L9 17l-5-5" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div>
        <h1 id="title">Account created</h1>
        <p>Your email is confirmed. You can close this tab and return to the app, or sign in again if needed.</p>
        <div class="actions">
          <a id="signinBtn" class="btn" href="https://your-app-signin-url.example.com">Go to sign in</a>
        </div>
        <div class="hint" id="autoHint" hidden>Redirecting…</div>
      </div>
    </div>
  </main>

  <script>
    // OPTIONAL: If you want to auto-redirect after a short delay, set a URL here.
    const returnUrl = "https://your-app-signin-url.example.com"; // change or leave blank to disable
    const delayMs = 2500; // 2.5s
    if (returnUrl && /^https?:|^[a-z]+:\/\//i.test(returnUrl)) {
      document.getElementById('signinBtn').href = returnUrl;
      const hint = document.getElementById('autoHint');
      hint.hidden = false;
      setTimeout(() => { location.href = returnUrl; }, delayMs);
    }
  </script>
</body>
</html>
